# ──────────────────────────────────────────────────────────────
# LX-OS Hub — Production Nginx Configuration
# Handles: reverse proxy, gzip, security headers, uploads
# ──────────────────────────────────────────────────────────────

# Tune for low-memory VPS (1 core, 512MB RAM)
worker_processes 1;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20M;  # Allow up to 20MB uploads

    # ── Gzip ───────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/x-javascript image/svg+xml;

    # ── Rate limiting ──────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=auth:10m   rate=10r/m;
    limit_req_zone  $binary_remote_addr  zone=api:10m    rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=uploads:10m rate=20r/m;
    limit_req_status 429;

    # ── Security headers (applied to all locations) ────────────
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "SAMEORIGIN"      always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # NOTE: Tighten Content-Security-Policy once you know your font/script sources
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;

    server {
        listen 80;
        server_name _;

        # ── API proxy ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://api:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            # Remove CORS headers from upstream — nginx controls them
            proxy_hide_header  Access-Control-Allow-Origin;
        }

        # ── Auth endpoints — stricter rate limit ───────────────
        location ~ ^/api/auth/(login|register|forgot-password) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://api:8000/auth/$1;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Uploaded file serving (static) ────────────────────
        location /uploads/ {
            limit_req zone=uploads burst=30 nodelay;
            proxy_pass         http://api:8000/uploads/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            # Cache uploaded files — they're content-addressed (immutable by sha256)
            proxy_cache_valid  200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # ── Next.js frontend (catch-all) ──────────────────────
        location / {
            proxy_pass         http://web:3000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 30s;
        }

        # ── Health check (no rate limit, no auth) ─────────────
        location = /health {
            proxy_pass http://api:8000/health;
            proxy_http_version 1.1;
            access_log off;
        }

        # ── Block common attack paths ──────────────────────────
        location ~ /\. {
            deny all;
        }
        location ~* \.(env|sql|log|bak|cfg|conf)$ {
            deny all;
        }
    }
}
