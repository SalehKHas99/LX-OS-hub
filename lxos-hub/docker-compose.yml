version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lxos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: ./services/api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lxos
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_INTERNAL_BASE: http://api:8000
      UPLOAD_DIR: /app/uploads
      DEMO_MODE: "true"
      FRONTEND_URL: "http://localhost:3000"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads
    command: >
      sh -c "python -m app.migrate && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./services/api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lxos
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_INTERNAL_BASE: http://api:8000
      UPLOAD_DIR: /app/uploads
      DEMO_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads
    command: python -m app.worker

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
