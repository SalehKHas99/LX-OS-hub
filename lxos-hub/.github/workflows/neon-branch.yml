# ──────────────────────────────────────────────────────────────
# LX-OS Hub — Neon Branch per PR
# Creates an isolated PostgreSQL branch for every PR.
# Migrations run against the branch, not production.
# Branch is deleted when PR is closed or merged.
# ──────────────────────────────────────────────────────────────
name: Neon Branch per PR

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  create-branch:
    name: Create Neon branch
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    outputs:
      db_url:     ${{ steps.create.outputs.db_url }}
      branch_id:  ${{ steps.create.outputs.branch_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Create Neon branch for PR ${{ github.event.pull_request.number }}
        id: create
        uses: neondatabase/create-branch-action@v5
        with:
          project_id:  ${{ secrets.NEON_PROJECT_ID }}
          api_key:     ${{ secrets.NEON_API_KEY }}
          branch_name: pr-${{ github.event.pull_request.number }}
          parent:      main

      - name: Run migrations against PR branch
        env:
          DATABASE_URL:   ${{ steps.create.outputs.db_url }}
          JWT_SECRET:     ${{ secrets.JWT_SECRET }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          DEMO_MODE: "false"
        run: |
          cd services/api
          pip install -q -r requirements.txt
          PYTHONPATH=. python -m app.migrate

      - name: Post branch URL as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const branchUrl = `https://console.neon.tech/app/projects/${{ secrets.NEON_PROJECT_ID }}/branches/${{ steps.create.outputs.branch_id }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '### 🗄️ Neon Database Branch Ready',
                '',
                `Branch: \`pr-${{ github.event.pull_request.number }}\``,
                `[View in Neon Console](${branchUrl})`,
                '',
                '> Migrations have been applied. This branch is deleted automatically when the PR closes.',
              ].join('\n'),
            });

  delete-branch:
    name: Delete Neon branch
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Delete Neon branch for PR ${{ github.event.pull_request.number }}
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id:  ${{ secrets.NEON_PROJECT_ID }}
          api_key:     ${{ secrets.NEON_API_KEY }}
          branch_name: pr-${{ github.event.pull_request.number }}
