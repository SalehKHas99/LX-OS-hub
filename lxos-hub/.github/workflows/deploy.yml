# ──────────────────────────────────────────────────────────────
# LX-OS Hub — Production Deploy
# Triggers on push to main after CI passes.
# SSH-deploys to VPS via git pull + docker compose rebuild.
# ──────────────────────────────────────────────────────────────
name: Deploy to Production

on:
  push:
    branches: [main]

# Only run one deploy at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: []   # Uncomment below to require CI to pass first:
    # needs: [api, web]    # reference jobs from ci.yml via workflow_run trigger

    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            set -e
            cd /opt/lxos-hub

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Rebuilding and restarting API + Web ==="
            docker compose -f docker-compose.prod.yml up -d --no-deps --build api web

            echo "=== Running migrations ==="
            docker compose -f docker-compose.prod.yml run --rm api python -m app.migrate

            echo "=== Restarting worker ==="
            docker compose -f docker-compose.prod.yml restart worker

            echo "=== Health check ==="
            sleep 5
            curl -sf http://localhost:8000/health || (echo "Health check FAILED" && exit 1)

            echo "=== Deploy complete ==="

      - name: Notify success
        if: success()
        run: echo "✅ Production deploy succeeded"

      - name: Notify failure
        if: failure()
        run: echo "❌ Production deploy FAILED — check SSH logs"
