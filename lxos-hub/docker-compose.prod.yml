version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: lxos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not exposed externally — only internal network
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    command: redis-server --save "" --appendonly no  # no persistence for queue broker

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/lxos
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_INTERNAL_BASE: http://api:8000
      UPLOAD_DIR: /app/uploads
      DEMO_MODE: ${DEMO_MODE:-false}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads
    command: >
      sh -c "python -m app.migrate && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/lxos
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_INTERNAL_BASE: http://api:8000
      UPLOAD_DIR: /app/uploads
      DEMO_MODE: ${DEMO_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads
    command: python -m app.worker

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE: /api
    expose:
      - "3000"
    depends_on:
      - api

  nginx:
    build: ./services/nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
    volumes:
      - ./services/nginx/certs:/etc/nginx/certs:ro  # mount TLS certs if available

volumes:
  pgdata:
  uploads:
